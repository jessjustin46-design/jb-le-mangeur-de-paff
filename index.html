<script>
  // Show install banner on iOS Safari after 3s (if not already installed)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const alreadyDismissed = localStorage.getItem('pwa-banner-dismissed');
  if (isIOS && !isStandalone && !alreadyDismissed) {
    setTimeout(() => {
      document.getElementById('install-banner').classList.add('show');
    }, 3000);
  }
  document.getElementById('install-banner').querySelector('.close').addEventListener('click', () => {
    localStorage.setItem('pwa-banner-dismissed', '1');
  });
</script>

function getStatus(v,min,max){
  if(v===""||v===null||v===undefined||(min===0&&max===0)) return "none";
  const n=parseFloat(v); if(isNaN(n)) return "none";
  if(n<min) return "low"; if(n>max) return "high"; return "ok";
}
const ST={ok:{b:C.green,bg:C.greenBg,t:C.green,badge:"OK"},low:{b:C.orange,bg:C.orangeBg,t:C.orange,badge:"Bas"},high:{b:C.red,bg:C.redBg,t:C.red,badge:"Haut"},none:{b:C.border,bg:C.bg2,t:C.text3,badge:"—"}};

function getDifficultyColor(d){
  if(d==="Facile") return C.green;
  if(d==="Intermédiaire") return C.gold;
  if(d==="Avancé") return C.orange;
  return C.red;
}

function calcCulture(startDate, strainKey) {
  if (!startDate) return { week:1, phase:"germination", days:0, daysToNext:null, isAuto:false };
  const days = Math.floor((new Date() - new Date(startDate)) / 86400000);
  const week = Math.floor(days/7) + 1;
  const strain = ALL_STRAINS[strainKey];
  const isAuto = strain?.category === "auto";
  let phase = "germination";
  if (isAuto) {
    const totalDays = (strain.total_weeks.max) * 7;
    const dryStart = totalDays - 14;
    if (days >= 7) phase = "veg";
    if (days >= 21) phase = "flower";
    if (days >= dryStart) phase = "drying";
    const milestones = { germination:7, veg:21, flower:dryStart, drying:totalDays };
    return { week, phase, days, daysToNext: Math.max(0, (milestones[phase]||999) - days), isAuto };
  } else {
    if (days >= 7) phase = "veg";
    if (days >= 63) phase = "flower";
    if (days >= 147) phase = "drying";
    const milestones = { germination:7, veg:63, flower:147, drying:161 };
    return { week, phase, days, daysToNext: Math.max(0, (milestones[phase]||999) - days), isAuto };
  }
}

// ─── BOX RECOMMENDATIONS ─────────────────────────────────────────────────────
function BoxRecommendations({ strainKey, boxPresetId, customBox }) {
  const s = ALL_STRAINS[strainKey]; if(!s) return null;
  let boxH = 0;
  if (boxPresetId === "custom") { boxH = parseInt(customBox.height)||0; }
  else { const p = BOX_PRESETS.find(b=>b.id===boxPresetId); boxH = p?.height||0; }
  if (boxH===0) return null;
  const usableH = boxH - 40 - 20;
  const fits = usableH >= s.height_cm.max;
  const tight = usableH >= s.height_cm.max * 0.75 && usableH < s.height_cm.max;
  const recs = [];
  if (!fits && !tight) recs.push({ type:"warn", text:`⚠️ Box limite ! Hauteur utile ~${usableH}cm vs plante max ${s.height_cm.max}cm. LST/SCROG recommandé.` });
  else if (tight) recs.push({ type:"warn", text:`📐 Serré. ~${usableH}cm utile — entraînement conseillé.` });
  else recs.push({ type:"ok", text:`✅ Box adaptée ! ~${usableH}cm utile.` });
  if (s.category==="auto") recs.push({ type:"tip", text:"⚡ Auto: lumière constante toute la vie." });
  const colors={ok:C.green,warn:C.orange,tip:C.blue};
  const bgs={ok:C.greenBg,warn:C.orangeBg,tip:C.blueBg};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
      {recs.map((r,i)=>(
        <div key={i} style={{fontSize:11,color:colors[r.type],background:bgs[r.type],padding:"8px 12px",borderRadius:8,border:`1px solid ${colors[r.type]}33`,fontFamily:"monospace",lineHeight:1.5}}>{r.text}</div>
      ))}
    </div>
  );
}

        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {allAlerts.length>0&&(
            <div style={{background:C.redBg,border:`1px solid ${C.red}44`,borderRadius:10,padding:"4px 10px"}}>
              <span style={{color:C.red,fontSize:11,fontFamily:"monospace"}}>⚠ {allAlerts.length}</span>
            </div>
          )}
          <div style={{background:pd.bg,border:`1.5px solid ${pd.color}44`,borderRadius:12,padding:"7px 12px",textAlign:"center",cursor:"pointer"}} onClick={()=>setShowStart(true)}>
            <div style={{fontSize:12,color:pd.color,fontWeight:700,lineHeight:1.2}}>{pd.label}</div>
            <div style={{fontSize:11,color:C.gold,fontFamily:"monospace",fontWeight:700}}>S{cult.week} J{cult.days+1}</div>
          </div>
        </div>
      </header>

      {/* SCROLL AREA */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{padding:"14px 14px 6px"}}>

          {/* Phase Quick Switch */}
          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
            {Object.entries(PHASES).map(([key,p])=>(
              <button key={key} onClick={()=>setManualPhase(key===cult.phase&&!manualPhase?null:key)}
                style={{flexShrink:0,padding:"8px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontFamily:"monospace",border:`1.5px solid ${phase===key?p.color:C.border}`,background:phase===key?p.bg:"transparent",color:phase===key?p.color:C.text3,whiteSpace:"nowrap"}}>
                {p.label}{key===cult.phase&&<span style={{fontSize:8,opacity:0.6}}> auto</span>}
              </button>
            ))}
            <button onClick={()=>setAutoMode(a=>!a)}
              style={{flexShrink:0,padding:"8px 12px",borderRadius:20,cursor:"pointer",border:`1.5px solid ${autoMode?C.green:C.border}`,background:autoMode?C.greenBg:"transparent",color:autoMode?C.green:C.text3,fontSize:11,fontFamily:"monospace"}}>
              {autoMode?"🤖 AUTO":"👋 MANUEL"}
            </button>
          </div>

          {/* Tips banner */}
          <div style={{background:pd.bg,border:`1px solid ${pd.color}22`,borderRadius:12,padding:"10px 14px",marginBottom:12,fontSize:11,color:pd.color,fontFamily:"monospace",lineHeight:1.5}}>
            {pd.label} — {isAuto?strainData.light_schedule:`${pd.light_hours}h lumière`} · {strainData.tips_global}
          </div>

          {/* TAB CONTENT */}
          <div className="fade-in" key={tab}>

          {/* SUIVI */}
          {tab==="suivi" && (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {/* Progress bar */}
              <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:16,padding:"16px 18px",boxShadow:`0 2px 12px ${C.shadow}`}}>
                <div style={{fontSize:10,color:C.text3,letterSpacing:2,marginBottom:12,fontFamily:"monospace"}}>PROGRESSION</div>
                <div style={{height:8,background:C.bg3,borderRadius:4,overflow:"hidden",marginBottom:14}}>
                  <div style={{height:"100%",width:`${Math.min(100,(cult.days/161)*100)}%`,background:`linear-gradient(90deg,${C.teal},${C.green},${C.gold},${C.orange})`,borderRadius:4,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                  {[{key:"germination",d:0},{key:"veg",d:7},{key:"flower",d:63},{key:"drying",d:147}].map(step=>{
                    const isAct=phase===step.key, isDone=cult.days>step.d+7&&!isAct, p=PHASES[step.key];
                    return(
                      <div key={step.key} style={{background:isAct?p.bg:isDone?`${p.color}08`:C.bg3,border:`1.5px solid ${isAct?p.color:isDone?`${p.color}22`:C.border}`,borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
                        <div style={{fontSize:20}}>{p.label.split(" ")[0]}</div>
                        <div style={{fontSize:9,fontWeight:700,color:isAct?p.color:isDone?p.color:C.text3,fontFamily:"monospace",marginTop:3}}>
                          {step.key==="germination"?"GERM":step.key==="veg"?"VEG":step.key==="flower"?"FLEUR":"SÉCH"}
                        </div>
                        {isAct&&<div style={{fontSize:8,color:p.color,fontFamily:"monospace",marginTop:2,fontWeight:700}}>EN COURS</div>}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {[
                  {l:"JOUR",v:`J${cult.days+1}`,c:C.green},
                  {l:"SEMAINE",v:`S${cult.week}`,c:C.gold},
                  {l:"PROCHAINE",v:cult.daysToNext>0?`${cult.daysToNext}j`:"Final",c:pd.color},
                ].map(s=>(
                  <div key={s.l} style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 10px",boxShadow:`0 2px 8px ${C.shadow}`,textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.text3,letterSpacing:1.5,fontFamily:"monospace"}}>{s.l}</div>
                    <div style={{fontSize:28,fontWeight:700,color:s.c,fontFamily:"Georgia,serif",lineHeight:1.1,marginTop:4}}>{s.v}</div>
                  </div>
                ))}
              </div>

              {/* Targets */}
              <div style={{background:pd.bg,border:`1.5px solid ${pd.color}33`,borderRadius:14,padding:"14px 16px"}}>
                <div style={{fontSize:10,color:pd.color,letterSpacing:2,marginBottom:10,fontFamily:"monospace"}}>CIBLES — {strainData.icon} {strainData.name}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    {l:"Température",v:`${prof.temp.min}-${prof.temp.max}°C`},
                    {l:"Humidité",v:`${prof.humidity.min}-${prof.humidity.max}%`},
                    {l:"CO₂",v:`${pd.co2.min}-${pd.co2.max}ppm`},
                    {l:"EC cible",v:phase!=="drying"?`${hp.ec.min}-${hp.ec.max}mS`:"N/A"},
                    {l:"Lumière",v:isAuto?strainData.light_schedule:`${pd.light_hours}h`},
                    {l:"Hauteur",v:`${strainData.height_cm.min}-${strainData.height_cm.max}cm`},
                  ].map(r=>(
                    <div key={r.l} style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:10,color:C.text3,fontFamily:"monospace"}}>{r.l}</div>
                      <div style={{fontSize:12,color:pd.color,fontWeight:700}}>{r.v}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Modify button */}
              <button onClick={()=>setShowStart(true)} style={{padding:"14px 0",borderRadius:14,cursor:"pointer",border:`1.5px solid ${C.border}`,background:"#fff",color:C.text3,fontSize:13,fontFamily:"monospace",boxShadow:`0 2px 8px ${C.shadow}`}}>
                ✏️ Modifier la culture
              </button>
            </div>
          )}

          {/* AIR */}
          {tab==="air" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <MetricCard label="Température" value={sensors.temp} onChange={v=>setSensors(s=>({...s,temp:v}))} min={prof.temp.min} max={prof.temp.max} unit="°C" icon="🌡"/>
              <MetricCard label="Humidité" value={sensors.humidity} onChange={v=>setSensors(s=>({...s,humidity:v}))} min={prof.humidity.min} max={prof.humidity.max} unit="%" icon="💧"/>
              <MetricCard label="CO₂" value={sensors.co2} onChange={v=>setSensors(s=>({...s,co2:v}))} min={pd.co2.min} max={pd.co2.max} unit="ppm" icon="🌬"/>
              <MetricCard label="VPD" value={sensors.vpd} onChange={v=>setSensors(s=>({...s,vpd:v}))} min={pd.vpd.min} max={pd.vpd.max} unit="kPa" icon="📊"/>
            </div>
          )}

          {/* HYDRO */}
          {tab==="hydro" && (
            phase==="drying" ? (
              <div style={{background:C.orangeBg,border:`1.5px solid ${C.orange}44`,borderRadius:16,padding:"40px 20px",textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>🍂</div>
                <div style={{fontSize:16,color:C.orange,fontWeight:700}}>Phase Séchage</div>
                <div style={{fontSize:13,color:C.text3,marginTop:8,fontFamily:"monospace"}}>Hydro désactivé</div>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <MetricCard label="pH" value={hydro.ph} onChange={v=>setHydro(h=>({...h,ph:v}))} min={hp.ph.min} max={hp.ph.max} unit="pH" icon="🧪"/>
                <MetricCard label="EC" value={hydro.ec} onChange={v=>setHydro(h=>({...h,ec:v}))} min={hp.ec.min} max={hp.ec.max} unit="mS/cm" icon="⚡"/>
                <MetricCard label="Température eau" value={hydro.water_temp} onChange={v=>setHydro(h=>({...h,water_temp:v}))} min={hp.water_temp.min} max={hp.water_temp.max} unit="°C" icon="🌡"/>
              </div>
            )
          )}

          {/* CLIMAT */}
          {tab==="climat" && (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {autoMode && (
                <div style={{background:C.goldBg,border:`1.5px solid ${C.goldXL}55`,borderRadius:12,padding:"10px 14px",fontSize:11,color:C.text2,fontFamily:"monospace"}}>
                  🤖 Mode automatique actif — les relais s'adaptent aux valeurs saisies.
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <RelayBtn label="LED SF1000" icon="💡" on={relays.light&&phase!=="drying"} onToggle={()=>setRelays(r=>({...r,light:!r.light}))} color="#d4a017"/>
                <RelayBtn label="Extracteur" icon="💨" on={relays.extractor} onToggle={()=>setRelays(r=>({...r,extractor:!r.extractor}))} color={C.blue}/>
                <RelayBtn label="Ventilateur" icon="🌀" on={relays.fan} onToggle={()=>setRelays(r=>({...r,fan:!r.fan}))} color={C.blue}/>
                <RelayBtn label="Humidif." icon="💧" on={relays.humidifier} onToggle={()=>setRelays(r=>({...r,humidifier:!r.humidifier}))} color={C.blue}/>
                <RelayBtn label="Déshumid." icon="🌬" on={relays.dehumidifier} onToggle={()=>setRelays(r=>({...r,dehumidifier:!r.dehumidifier}))} color={C.orange}/>
                <RelayBtn label="Chauffage" icon="🔥" on={relays.heater} onToggle={()=>setRelays(r=>({...r,heater:!r.heater}))} color={C.red}/>
              </div>
            </div>
          )}

          {tab==="lampe" && <LampControl phase={phase}/>}

          {/* IA */}
          {tab==="ia" && (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:16,padding:"16px 18px",boxShadow:`0 2px 12px ${C.shadow}`}}>
                <div style={{fontSize:9,color:C.gold,letterSpacing:3,fontFamily:"monospace",marginBottom:4}}>INTELLIGENCE ARTIFICIELLE</div>
                <div style={{fontSize:13,color:C.text,marginBottom:14}}>
                  Analyse : {strainData.icon} {strainData.name} — {pd.label} — S{cult.week}
                </div>
                <button onClick={askAI} disabled={aiLoading} style={{width:"100%",padding:"14px 0",borderRadius:12,cursor:aiLoading?"not-allowed":"pointer",background:aiLoading?C.bg3:`linear-gradient(135deg,${C.gold},${C.goldL})`,border:`1.5px solid ${C.gold}`,color:aiLoading?C.text3:"#fff",fontSize:14,fontFamily:"monospace",fontWeight:700,boxShadow:aiLoading?"none":`0 4px 16px ${C.gold}44`}}>
                  {aiLoading?"⏳ Analyse en cours...":"🤖 Analyser mes conditions"}
                </button>
              </div>
              <div style={{background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:16,padding:"18px 18px",minHeight:160,fontSize:13,lineHeight:1.9,color:C.text2,whiteSpace:"pre-wrap",fontFamily:"monospace",boxShadow:`0 2px 12px ${C.shadow}`}}>
                {aiText || <span style={{color:C.text3}}>Remplis les onglets Air et Hydro, puis tape sur Analyser.</span>}
              </div>
            </div>
          )}

          </div>
          <div style={{height:8}}/>
        </div>
      </div>

      {/* BOTTOM NAV */}
      <BottomNav tab={tab} setTab={setTab} alertCount={allAlerts.length}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service Worker for offline use -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
